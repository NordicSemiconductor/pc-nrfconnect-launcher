sections:
- name: December 2025
  entries:
  - "Updated the required version of SEGGER J-Link to v8.76 on the [Requirements and installation](./download_cfd.md) page."
- name: November 2025
  entries:
  - "Updated the [Supported operating systems](./os_support.md) page: Windows 11 is now Tier 1, Windows 10 is now Tier 3, macOS 15 is now Tier 1, and macOS 13 is now Tier 3."
  - "Added notes about the [Mainland China server](overview_cfd.md#mainland-china-server) to the pages about [Requirements and installation](download_cfd.md) and [Installing apps in nRF Connect for Desktop](./installing_apps.md)."
- name: September 2025
  entries:
  - "Updated the [Additional requirements](https://www.google.com/not-there) section on the [Requirements and installation](./download_cfd.md) page"
  - "Updated the [Working with identity tokens](https://www.google.com/#notThere) page with the information about allowing access to safe storage"
- name: August 2025
  entries:
  - "Added Matter Cluster Editor to the [list of supported apps](./index.md)"
  - "Updated the list of supported operating systems on the [Supported operating systems](./os_support.md) page with Windows 11 x86 support marked as `n/a` and a new entry for macOS 26"
- name: April 2025
  entries:
  - "Added the [Working with identity tokens](./working_with_authentications_tokens.md) page"
- name: March 2025
  entries:
