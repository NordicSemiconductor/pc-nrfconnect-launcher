site_name: nRF Connect for Desktop documentation
site_url:
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: custom-blue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - scheme: custom-blue-dark
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
  # logo: assets/logo.png
  # favicon: assets/logo.png
  features:
    - content.code.annotate
    - content.tooltips
    - content.tabs.link
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - toc.follow


extra_css:
  - stylesheets/style.css

copyright:
  Copyright &copy; 2023

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - meta
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 4

plugins:
  - macros
  - search
  - monorepo

extra:
  test: This is a test abbreviation snippet

nav:
  - Launcher:
    - Home: index.md
    - Supported operating systems: os_support.md
    - Requirements and installation: download_cfd.md
    - Overview: overview_cfd.md
    - Installing apps in nRF Connect for Desktop: installing_apps.md
    - Starting nRF Connect for Desktop with proxy settings: proxy_settings.md
    - Working with identity tokens: working_with_authentications_tokens.md
    - Revision history: revision_history.md
  - Quick Start: '!include ./docs/submodules/pc-nrfconnect-quickstart/mkdocs.yml'
  - Board Configurator: '!include ./docs/submodules/pc-nrfconnect-board-configurator/mkdocs.yml'
  - Cellular Monitor: '!include ./docs/submodules/pc-nrfconnect-cellularmonitor/mkdocs.yml'
  - Direct Test Mode: '!include ./docs/submodules/pc-nrfconnect-dtm/mkdocs.yml'
  - Matter Cluster Editor: '!include ./docs/submodules/pc-nrfconnect-matter-cluster-editor/mkdocs.yml'
  - Matter Quick Start: '!include ./docs/submodules/pc-nrfconnect-matter-quickstart/mkdocs.yml'
  - nPM PowerUP: '!include ./docs/submodules/pc-nrfconnect-npm/mkdocs.yml'
  - Power Profiler: '!include ./docs/submodules/pc-nrfconnect-ppk/mkdocs.yml'
  - Programmer: '!include ./docs/submodules/pc-nrfconnect-programmer/mkdocs.yml'
  - Serial Terminal: '!include ./docs/submodules/pc-nrfconnect-serial-terminal/mkdocs.yml'
  - RSSI Viewer: '!include ./docs/submodules/pc-nrfconnect-rssi/mkdocs.yml'