name: 'Docs: Publish to prod'
run-name: 'Docs: Publish docs to prod'

on:
    workflow_dispatch:
        inputs:
            ref:
                description:
                    Ref (Tag, branch, commit SHA) to publish the docs from.
                    Defaults to the main branch.
                type: string
    workflow_call:
        inputs:
            ref:
                type: string

jobs:
    echo-inputs:
        runs-on: ubuntu-latest
        name: Inputs
        steps:
            - uses: actions/github-script@v8
              if: github.event_name == 'workflow_dispatch'
              env:
                  REF: ${{ inputs.ref }}
                  FALLBACK_REF: ${{ github.ref_name }}
              with:
                  script: |
                      core.summary.addHeading('Workflow inputs', '2');
                      core.summary.addTable([['Ref', process.env.REF ? `<code>${process.env.REF}</code>` : `not set explicitly, using ref <code>${process.env.FALLBACK_REF}</code>`]]);
                      core.summary.write();
    create-doc-bundle:
        name: Create doc bundle
        uses: './.github/workflows/docs-bundle.yml'
        with:
            bundle-name: nrf-connect-desktop
            ref: ${{ inputs.ref }}
    publish-zoomin-bundle:
        name: Publish Zoomin bundle to prod
        needs: create-doc-bundle
        runs-on: ubuntu-latest
        steps:
            - name: Get bundle
              uses: actions/download-artifact@v4
              with:
                  name: nrf-connect-desktop
            - name: Upload documentation
              env:
                  FOLDER: docs-be.nordicsemi.com
              run: |
                  # trust server
                  mkdir -p ~/.ssh
                  ssh-keyscan upload-v1.zoominsoftware.io >> ~/.ssh/known_hosts

                  # prepare key
                  echo "${{ secrets.ZOOMIN_KEY }}" > zoomin_key
                  chmod 600 zoomin_key

                  # upload bundle:
                  sftp -v -i zoomin_key nordic@upload-v1.zoominsoftware.io <<EOF
                  cd /${FOLDER}/markdown/incoming
                  put "nrf-connect-desktop.zip"
                  quit
                  EOF
