name: 'Docs: Create bundle'

on:
    pull_request:
        types: [synchronize, opened, reopened]
        paths:
            - .github/workflows/docs-bundle.yml
            - doc
    workflow_dispatch:
        inputs:
            ref:
                description:
                    Ref (Tag, branch, commit SHA) to publish the docs from.
                    Defaults to the main branch.
                type: string
    workflow_call:
        inputs:
            bundle-name:
                type: string
                required: true
            ref:
                description:
                    Ref (Tag, branch, commit SHA) to publish the docs from.
                type: string

jobs:
    echo-inputs:
        runs-on: ubuntu-latest
        name: Inputs
        steps:
            - uses: actions/github-script@v8
              if: github.event_name == 'workflow_dispatch'
              env:
                  REF: ${{ inputs.ref }}
                  FALLBACK_REF: ${{ github.ref_name }}
              with:
                  script: |
                      core.summary.addHeading('Workflow inputs', '2');
                      core.summary.addTable([['Ref', process.env.REF ? `<code>${process.env.REF}</code>` : `not set explicitly, using ref <code>${process.env.FALLBACK_REF}</code>`]]);
                      core.summary.write();
    create-doc-bundle:
        name: Create documentation bundle
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.ref || github.ref }}
                  submodules: recursive

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Initialize submodules
              run: |
                  if [ -f doc/submodules.json ]; then
                      npm run submodules:init
                  fi

            - name: Resolve mkdocs.yml includes
              run: node scripts/resolveMkdocsIncludes.js

            - name: Create zip file with all doc sources
              run: |
                  cd doc/
                  # Copy resolved mkdocs.yml to mkdocs.yml for bundle
                  cp mkdocs.resolved.yml mkdocs.yml

                  # Create zip with main docs, resolved mkdocs.yml, and zoomin directory
                  zip -r "../nrf-connect-desktop.zip" docs/ mkdocs.yml zoomin/

                  # Add all submodule mkdocs.yml files (now in docs/submodules/)
                  echo "Adding submodule mkdocs.yml files..."
                  find docs/submodules -name "mkdocs.yml" -print -exec zip -r "../nrf-connect-desktop.zip" {} \;

                  # Add all submodule doc directories recursively (note: doc/, not docs/)
                  echo "Adding submodule doc directories..."
                  for doc_dir in docs/submodules/*/doc; do
                      if [ -d "$doc_dir" ]; then
                          echo "Adding $doc_dir"
                          zip -r "../nrf-connect-desktop.zip" "$doc_dir"
                      fi
                  done

                  # List contents of zip for verification
                  echo "Zip file contents:"
                  unzip -l "../nrf-connect-desktop.zip" | head -50

            - name: Upload documentation artifact
              uses: actions/upload-artifact@v4
              with:
                  name: nrf-connect-desktop
                  path: nrf-connect-desktop.zip
                  retention-days: 7
